name: Retrain ML Model

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'Dockerfile'
      - '.dockerignore'
  workflow_dispatch: # Enables the manual trigger button

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install package
        run: pip install -e .

      - name: Run training pipeline
        run: python src/components/data_ingestion.py

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

  docker:
    needs: train
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

      - name: Compute next version
        id: version
        run: |
          last_tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          if [ -z "$last_tag" ]; then
            last_tag="v0.0.0"
          fi
          version="${last_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          msg=$(git log -1 --pretty=%B)
          if echo "$msg" | grep -qiE '(^|[^a-z])major([^a-z]|$)'; then
            bump="major"
          elif echo "$msg" | grep -qiE '(^|[^a-z])minor([^a-z]|$)'; then
            bump="minor"
          else
            bump="patch"
          fi

          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          new_version="$major.$minor.$patch"
          echo "Bumping $bump: $last_tag -> v$new_version"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Tag commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mlproject:latest,${{ secrets.DOCKERHUB_USERNAME }}/mlproject:${{ steps.version.outputs.version }}
